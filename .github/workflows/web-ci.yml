name: Web CI

on:
  pull_request:
    paths:
      - "apps/web/**"
      - "docker-compose.yml"
      - "infra/postgres/init.sql"
      - ".github/workflows/web-ci.yml"
  push:
    branches:
      - main
    paths:
      - "apps/web/**"
      - "docker-compose.yml"
      - "infra/postgres/init.sql"
      - ".github/workflows/web-ci.yml"

concurrency:
  group: web-ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  web-static-checks:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/web
    env:
      NEXT_TELEMETRY_DISABLED: "1"
      DATABASE_URL: "postgresql://app:app@localhost:5433/oura"
      OURA_CLIENT_ID: "ci"
      OURA_CLIENT_SECRET: "ci"
      OURA_REDIRECT_URI: "http://localhost:3000/api/auth/oura/callback"
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: apps/web/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Typecheck
        run: npx tsc --noEmit

      - name: Build
        run: npm run build

  web-runtime-smoke:
    runs-on: ubuntu-latest
    needs: web-static-checks
    defaults:
      run:
        working-directory: apps/web
    env:
      NEXT_TELEMETRY_DISABLED: "1"
      DATABASE_URL: "postgresql://app:app@localhost:5433/oura"
      OURA_CLIENT_ID: "ci"
      OURA_CLIENT_SECRET: "ci"
      OURA_REDIRECT_URI: "http://localhost:3000/api/auth/oura/callback"
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: apps/web/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Start Postgres
        working-directory: .
        run: docker compose up -d db

      - name: Wait for Postgres readiness
        working-directory: .
        run: |
          for i in {1..30}; do
            if docker compose exec -T db pg_isready -U app -d oura; then
              exit 0
            fi
            sleep 2
          done
          echo "Postgres did not become ready in time"
          docker compose logs db
          exit 1

      - name: Build production app
        run: npm run build

      - name: Start production server
        run: npm run start > /tmp/web-server.log 2>&1 & echo $! > /tmp/web-server.pid

      - name: Wait for app readiness
        run: |
          for i in {1..30}; do
            if curl --fail --silent http://127.0.0.1:3000 >/tmp/web-home.html; then
              exit 0
            fi
            sleep 2
          done
          echo "Web app did not become ready in time"
          cat /tmp/web-server.log
          exit 1

      - name: Assert homepage responds
        run: grep -Eq "Daily dashboard|No data yet" /tmp/web-home.html

      - name: Stop app and database
        if: always()
        working-directory: .
        run: |
          if [ -f /tmp/web-server.pid ]; then
            kill "$(cat /tmp/web-server.pid)" || true
          fi
          if [ -f /tmp/web-server.log ]; then
            cat /tmp/web-server.log
          fi
          docker compose down -v
