services:
  db:
    image: postgres:16
    environment:
      POSTGRES_DB: oura
      POSTGRES_USER: app
      POSTGRES_PASSWORD: app
    ports:
      - "5433:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./infra/postgres/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U app -d oura"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  pgdata:
